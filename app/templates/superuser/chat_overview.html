{% extends "base.html" %}
{% block topbar %}
<div class="top-bar" style="background:#0B1622; clip-path:none; padding-bottom:16px;">
  <div class="app-shell"><a href="{{ url_for('superuser.dashboard') }}" style="color:#F0A93A;">← Paneli i Sistemit</a></div>
</div>
{% endblock %}
{% block content %}
<div class="page-title"><h1>Të gjitha Chat-et</h1></div>
{% for r in rooms %}
<div class="card">
  <div style="display:flex; justify-content:space-between;">
    <strong>{{ r.name }}</strong>
    <span class="badge badge-sky">{{ r.room_type.value }}</span>
  </div>
  <div class="card-row" style="border-bottom:none;"><span>Mesazhe gjithsej</span><span>{{ message_counts.get(r.id, 0) }}</span></div>
</div>
{% else %}
<div class="card"><p class="muted">S'ka dhoma chat ende.</p></div>
{% endfor %}
{% endblock %}
